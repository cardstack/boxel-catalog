name: CI Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  checks: write
  contents: read
  id-token: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    concurrency:
      group: lint-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      # Checkout the boxel monorepo at root to get tooling and init action
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # 4.2.2
        with:
          repository: cardstack/boxel

      # Checkout this catalog repo directly into the monorepo's catalog location
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # 4.2.2
        with:
          path: packages/catalog/contents

      # Remove experiments-realm so it is excluded from host lint:types
      - name: Remove experiments-realm
        run: rm -rf packages/experiments-realm

      - uses: ./.github/actions/init

      # Boxel UI and Boxel Icons need to be built first so that their
      # linting outputs types are available for projects that depend on them
      - name: List catalog files
        run: find packages/catalog/contents -type f | sort

      - name: Build common dependencies
        if: always()
        run: pnpm run build-common-deps

      - name: Lint Host
        if: always()
        run: pnpm run lint
        working-directory: packages/host

