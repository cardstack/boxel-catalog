name: Sync to Workspace

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  STAGING_WORKSPACE_URL: https://realms-staging.stack.cards/external-catalog
  PRODUCTION_WORKSPACE_URL: https://app.boxel.ai/external-catalog

jobs:
  sync-staging:
    name: Sync to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync to staging workspace
        id: sync
        uses: ./.github/actions/sync-workspace
        with:
          environment: staging
          workspace-url: ${{ env.STAGING_WORKSPACE_URL }}
          matrix-url: https://matrix-staging.stack.cards
          matrix-username: ${{ secrets.STAGING_SUBMISSIONBOT_MATRIX_USERNAME }}
          matrix-password: ${{ secrets.STAGING_SUBMISSIONBOT_MATRIX_PASSWORD }}

      - name: Write staging sync report
        if: always()
        shell: bash
        env:
          SYNC_OUTPUT: ${{ steps.sync.outputs.sync-output }}
        run: |
          mkdir -p artifacts
          STATUS="${{ job.status }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          SYNCED_AT=$(date -u '+%Y-%m-%d %H:%M:%S')

          cat > artifacts/staging-sync-report.md <<EOF
          ## Staging Workspace Sync — ${STATUS}

          **Workspace:** ${{ env.STAGING_WORKSPACE_URL }}
          **Commit:** ${SHORT_SHA}
          **Synced at:** ${SYNCED_AT} UTC

          ### Output
          \`\`\`
          ${SYNC_OUTPUT:-No output captured}
          \`\`\`
          EOF

      - name: Upload staging sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-sync-report
          path: artifacts/staging-sync-report.md

  sync-production:
    name: Sync to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync to production workspace
        id: sync
        uses: ./.github/actions/sync-workspace
        with:
          environment: production
          workspace-url: ${{ env.PRODUCTION_WORKSPACE_URL }}
          matrix-url: https://matrix.boxel.ai
          matrix-username: ${{ secrets.PROD_SUBMISSIONBOT_MATRIX_USERNAME }}
          matrix-password: ${{ secrets.PROD_SUBMISSIONBOT_MATRIX_PASSWORD }}

      - name: Write production sync report
        if: always()
        shell: bash
        env:
          SYNC_OUTPUT: ${{ steps.sync.outputs.sync-output }}
        run: |
          mkdir -p artifacts
          STATUS="${{ job.status }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          SYNCED_AT=$(date -u '+%Y-%m-%d %H:%M:%S')

          cat > artifacts/production-sync-report.md <<EOF
          ## Production Workspace Sync — ${STATUS}

          **Workspace:** ${{ env.PRODUCTION_WORKSPACE_URL }}
          **Commit:** ${SHORT_SHA}
          **Synced at:** ${SYNCED_AT} UTC

          ### Output
          \`\`\`
          ${SYNC_OUTPUT:-No output captured}
          \`\`\`
          EOF

      - name: Upload production sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-sync-report
          path: artifacts/production-sync-report.md
