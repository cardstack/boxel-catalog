name: Sync to Workspace

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  STAGING_WORKSPACE_URL: https://realms-staging.stack.cards/catalog/
  PRODUCTION_WORKSPACE_URL: https://app.boxel.ai/catalog/

jobs:
  sync-staging:
    name: Sync to Staging
    runs-on: ubuntu-latest
    env:
      MATRIX_URL: https://matrix-staging.stack.cards
      MATRIX_USERNAME: ${{ secrets.STAGING_SUBMISSIONBOT_MATRIX_USERNAME }}
      MATRIX_PASSWORD: ${{ secrets.STAGING_SUBMISSIONBOT_MATRIX_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Boxel CLI
        run: npm install -g @cardstack/boxel-cli@latest

      - name: Configure Boxel profile
        run: |
          if echo "$MATRIX_URL" | grep -q "boxel.ai"; then
            DOMAIN="boxel.ai"
          elif echo "$MATRIX_URL" | grep -q "stack.cards"; then
            DOMAIN="stack.cards"
          else
            DOMAIN="localhost"
          fi
          boxel profile add \
            --user "@${MATRIX_USERNAME}:${DOMAIN}" \
            --password "${MATRIX_PASSWORD}" \
            --matrix-url "${MATRIX_URL}"

      - name: Sync to staging workspace
        id: sync
        run: |
          echo "Starting sync to staging workspace..."
          echo "Target workspace: ${STAGING_WORKSPACE_URL}"
          echo "Commit: ${{ github.sha }}"
          echo ""

          set +e
          OUTPUT=$(boxel realm push . "${STAGING_WORKSPACE_URL}" --delete 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"

          {
            echo "SYNC_OUTPUT<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "staging workspace sync failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "staging workspace sync completed successfully!"

      - name: Write staging sync report
        if: always()
        env:
          SYNC_OUTPUT: ${{ steps.sync.outputs.SYNC_OUTPUT }}
        run: |
          mkdir -p artifacts
          STATUS="${{ job.status }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          SYNCED_AT=$(date -u '+%Y-%m-%d %H:%M:%S')

          cat > artifacts/staging-sync-report.md <<EOF
          ## Staging Workspace Sync — ${STATUS}

          **Workspace:** ${STAGING_WORKSPACE_URL}
          **Commit:** ${SHORT_SHA}
          **Synced at:** ${SYNCED_AT} UTC

          ### Output
          \`\`\`
          ${SYNC_OUTPUT:-No output captured}
          \`\`\`
          EOF

      - name: Upload staging sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-sync-report
          path: artifacts/staging-sync-report.md

  sync-production:
    name: Sync to Production
    runs-on: ubuntu-latest
    env:
      MATRIX_URL: https://matrix.boxel.ai
      MATRIX_USERNAME: ${{ secrets.PROD_SUBMISSIONBOT_MATRIX_USERNAME }}
      MATRIX_PASSWORD: ${{ secrets.PROD_SUBMISSIONBOT_MATRIX_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Boxel CLI
        run: npm install -g @cardstack/boxel-cli@latest

      - name: Configure Boxel profile
        run: |
          if echo "$MATRIX_URL" | grep -q "boxel.ai"; then
            DOMAIN="boxel.ai"
          elif echo "$MATRIX_URL" | grep -q "stack.cards"; then
            DOMAIN="stack.cards"
          else
            DOMAIN="localhost"
          fi
          boxel profile add \
            --user "@${MATRIX_USERNAME}:${DOMAIN}" \
            --password "${MATRIX_PASSWORD}" \
            --matrix-url "${MATRIX_URL}"

      - name: Sync to production workspace
        id: sync
        run: |
          echo "Starting sync to production workspace..."
          echo "Target workspace: ${PRODUCTION_WORKSPACE_URL}"
          echo "Commit: ${{ github.sha }}"
          echo ""

          set +e
          OUTPUT=$(boxel realm push . "${PRODUCTION_WORKSPACE_URL}" --delete 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"

          {
            echo "SYNC_OUTPUT<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "production workspace sync failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "production workspace sync completed successfully!"

      - name: Write production sync report
        if: always()
        env:
          SYNC_OUTPUT: ${{ steps.sync.outputs.SYNC_OUTPUT }}
        run: |
          mkdir -p artifacts
          STATUS="${{ job.status }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          SYNCED_AT=$(date -u '+%Y-%m-%d %H:%M:%S')

          cat > artifacts/production-sync-report.md <<EOF
          ## Production Workspace Sync — ${STATUS}

          **Workspace:** ${PRODUCTION_WORKSPACE_URL}
          **Commit:** ${SHORT_SHA}
          **Synced at:** ${SYNCED_AT} UTC

          ### Output
          \`\`\`
          ${SYNC_OUTPUT:-No output captured}
          \`\`\`
          EOF

      - name: Upload production sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-sync-report
          path: artifacts/production-sync-report.md
