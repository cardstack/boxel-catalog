name: Sync to Workspace

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  STAGING_WORKSPACE_URL: https://realms-staging.stack.cards/external-catalog
  PRODUCTION_WORKSPACE_URL: https://app.boxel.ai/external-catalog

jobs:
  sync-staging:
    name: Sync to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync to staging workspace
        id: sync
        uses: ./.github/actions/sync-workspace
        with:
          environment: staging
          workspace-url: ${{ env.STAGING_WORKSPACE_URL }}
          matrix-url: https://matrix-staging.stack.cards
          matrix-username: ${{ secrets.STAGING_MATRIX_USERNAME }}
          matrix-password: ${{ secrets.STAGING_MATRIX_PASSWORD }}

      - name: Report staging success
        if: success()
        uses: actions/github-script@v7
        env:
          SYNC_OUTPUT: ${{ steps.sync.outputs.sync-output }}
          WORKSPACE_URL: ${{ env.STAGING_WORKSPACE_URL }}
        with:
          script: |
            const output = process.env.SYNC_OUTPUT || '';
            const workspaceUrl = process.env.WORKSPACE_URL;
            const shortSha = context.sha.substring(0, 7);
            const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const syncedAt = new Date().toISOString().replace('T', ' ').substring(0, 19);
            const body = `## Staging Workspace Sync Successful\n\n**Workspace:** ${workspaceUrl}\n\`\`\`\n${output}\n\`\`\`\n\n**Commit:** [\`${shortSha}\`](${commitUrl})\n**Synced at:** ${syncedAt} UTC`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });

      - name: Report staging failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SYNC_OUTPUT: ${{ steps.sync.outputs.sync-output }}
          WORKSPACE_URL: ${{ env.STAGING_WORKSPACE_URL }}
        with:
          script: |
            const output = process.env.SYNC_OUTPUT || 'No output captured';
            const workspaceUrl = process.env.WORKSPACE_URL;
            const shortSha = context.sha.substring(0, 7);
            const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const body = `## Staging Workspace Sync Failed\n\n**Workspace:** ${workspaceUrl}\n**Commit:** [\`${shortSha}\`](${commitUrl})\n**Action required:** Please check the workflow logs for details\n\n### Error Output\n\`\`\`\n${output}\n\`\`\`\n\n### Troubleshooting\n- Verify Matrix credentials are correctly set in repository secrets\n- Check workspace permissions and URL\n- Review file filtering rules (.gitignore/.boxelignore)`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });

  sync-production:
    name: Sync to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync to production workspace
        id: sync
        uses: ./.github/actions/sync-workspace
        with:
          environment: production
          workspace-url: ${{ env.PRODUCTION_WORKSPACE_URL }}
          matrix-url: https://matrix.boxel.ai
          matrix-username: ${{ secrets.MATRIX_USERNAME }}
          matrix-password: ${{ secrets.MATRIX_PASSWORD }}

      - name: Report production success
        if: success()
        uses: actions/github-script@v7
        env:
          SYNC_OUTPUT: ${{ steps.sync.outputs.sync-output }}
          WORKSPACE_URL: ${{ env.PRODUCTION_WORKSPACE_URL }}
        with:
          script: |
            const output = process.env.SYNC_OUTPUT || '';
            const workspaceUrl = process.env.WORKSPACE_URL;
            const shortSha = context.sha.substring(0, 7);
            const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const syncedAt = new Date().toISOString().replace('T', ' ').substring(0, 19);
            const body = `## Production Workspace Sync Successful\n\n**Workspace:** ${workspaceUrl}\n\`\`\`\n${output}\n\`\`\`\n\n**Commit:** [\`${shortSha}\`](${commitUrl})\n**Synced at:** ${syncedAt} UTC`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });

      - name: Report production failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SYNC_OUTPUT: ${{ steps.sync.outputs.sync-output }}
          WORKSPACE_URL: ${{ env.PRODUCTION_WORKSPACE_URL }}
        with:
          script: |
            const output = process.env.SYNC_OUTPUT || 'No output captured';
            const workspaceUrl = process.env.WORKSPACE_URL;
            const shortSha = context.sha.substring(0, 7);
            const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const body = `## Production Workspace Sync Failed\n\n**Workspace:** ${workspaceUrl}\n**Commit:** [\`${shortSha}\`](${commitUrl})\n**Action required:** Please check the workflow logs for details\n\n### Error Output\n\`\`\`\n${output}\n\`\`\`\n\n### Troubleshooting\n- Verify Matrix credentials are correctly set in repository secrets\n- Check workspace permissions and URL\n- Review file filtering rules (.gitignore/.boxelignore)`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });
