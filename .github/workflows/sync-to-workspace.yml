name: Sync to Workspace

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  STAGING_WORKSPACE_URL: https://realms-staging.stack.cards/external-catalog
  PRODUCTION_WORKSPACE_URL: https://app.boxel.ai/external-catalog

jobs:
  sync-workspace:
    name: Sync to Boxel Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install workspace-sync-cli
        run: npm install -g @cardstack/workspace-sync-cli

      - name: Verify CLI installation
        run: |
          workspace-push --help
          workspace-pull --help

      - name: Sync to staging workspace
        id: sync_staging
        env:
          MATRIX_URL: https://matrix-staging.stack.cards
          MATRIX_USERNAME: ${{ secrets.STAGING_MATRIX_USERNAME }}
          MATRIX_PASSWORD: ${{ secrets.STAGING_MATRIX_PASSWORD }}
        run: |
          echo "Starting sync to staging workspace..."
          echo "Target workspace: ${{ env.STAGING_WORKSPACE_URL }}"
          echo "Commit: ${{ github.sha }}"
          echo ""

          set +e
          OUTPUT=$(workspace-push . ${{ env.STAGING_WORKSPACE_URL }} --delete 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"

          echo "SYNC_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo "Staging workspace sync failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "Staging workspace sync completed successfully!"

      # - name: Sync to production workspace
      #   id: sync_production
      #   env:
      #     MATRIX_URL: https://matrix.boxel.ai
      #     MATRIX_USERNAME: ${{ secrets.MATRIX_USERNAME }}
      #     MATRIX_PASSWORD: ${{ secrets.MATRIX_PASSWORD }}
      #   run: |
      #     echo "Starting sync to production workspace..."
      #     echo "Target workspace: ${{ env.PRODUCTION_WORKSPACE_URL }}"
      #     echo "Commit: ${{ github.sha }}"
      #     echo ""
      #
      #     set +e
      #     OUTPUT=$(workspace-push . ${{ env.PRODUCTION_WORKSPACE_URL }} --delete 2>&1)
      #     EXIT_CODE=$?
      #     set -e
      #     echo "$OUTPUT"
      #
      #     echo "SYNC_OUTPUT<<EOF" >> $GITHUB_OUTPUT
      #     echo "$OUTPUT" >> $GITHUB_OUTPUT
      #     echo "EOF" >> $GITHUB_OUTPUT
      #
      #     if [ $EXIT_CODE -ne 0 ]; then
      #       echo "Production workspace sync failed with exit code $EXIT_CODE"
      #       exit $EXIT_CODE
      #     fi
      #     echo "Production workspace sync completed successfully!"

      - name: Report sync status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const stagingOutput = `${{ steps.sync_staging.outputs.SYNC_OUTPUT }}`;
            const productionOutput = `${{ steps.sync_production.outputs.SYNC_OUTPUT }}`;
            const body = `## Workspace Sync Successful\n\nSuccessfully synced changes to both workspaces\n\n### Staging\n**Workspace:** ${{ env.STAGING_WORKSPACE_URL }}\n\`\`\`\n${stagingOutput}\n\`\`\`\n\n### Production\n**Workspace:** ${{ env.PRODUCTION_WORKSPACE_URL }}\n\`\`\`\n${productionOutput}\n\`\`\`\n\n**Commit:** [\`${context.sha.substring(0, 7)}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})\n**Synced at:** ${new Date().toISOString().replace('T', ' ').substring(0, 19)} UTC`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });

      - name: Report sync failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const stagingOutput = `${{ steps.sync_staging.outputs.SYNC_OUTPUT }}` || '';
            const productionOutput = `${{ steps.sync_production.outputs.SYNC_OUTPUT }}` || '';
            const syncOutput = stagingOutput + '\n' + productionOutput || 'No output captured';

            const body = `## Workspace Sync Failed\n\nFailed to sync changes to workspace(s)\n**Commit:** [\`${context.sha.substring(0, 7)}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})\n**Action required:** Please check the workflow logs for details\n\n### Error Output\n\`\`\`\n${syncOutput}\n\`\`\`\n\n### Troubleshooting\n- Verify Matrix credentials are correctly set in repository secrets\n- Check workspace permissions and URL\n- Review file filtering rules (.gitignore/.boxelignore)`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });
