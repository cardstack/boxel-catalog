name: "Sync to Workspace"
description: "Sync files to a Boxel workspace using boxel-cli"

inputs:
  environment:
    description: "Environment name (e.g. staging, production)"
    required: true
  workspace-url:
    description: "Target workspace URL (e.g. https://app.boxel.ai/external-catalog)"
    required: true
  matrix-url:
    description: "Matrix server URL"
    required: true
  matrix-username:
    description: "Matrix username"
    required: true
  matrix-password:
    description: "Matrix password"
    required: true

outputs:
  sync-output:
    description: "Output from the sync command"
    value: ${{ steps.sync.outputs.SYNC_OUTPUT }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Install boxel-cli
      shell: bash
      run: npm install -g @cardstack/boxel-cli

    - name: Create boxel-cli profile
      shell: bash
      env:
        BOXEL_PASSWORD: ${{ inputs.matrix-password }}
      run: |
        # Determine domain from matrix URL
        if echo "${{ inputs.matrix-url }}" | grep -q "boxel.ai"; then
          DOMAIN="boxel.ai"
        else
          DOMAIN="stack.cards"
        fi
        MATRIX_ID="@${{ inputs.matrix-username }}:${DOMAIN}"
        echo "Creating profile for ${MATRIX_ID}"
        boxel profile add --user "${MATRIX_ID}" --password "${BOXEL_PASSWORD}"

    - name: Sync to ${{ inputs.environment }} workspace
      id: sync
      shell: bash
      run: |
        echo "Starting sync to ${{ inputs.environment }} workspace..."
        echo "Target workspace: ${{ inputs.workspace-url }}"
        echo "Commit: ${{ github.sha }}"
        echo ""

        set +e
        OUTPUT=$(boxel realm push . ${{ inputs.workspace-url }} --delete 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"

        echo "SYNC_OUTPUT<<EOF" >> $GITHUB_OUTPUT
        echo "$OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        if [ $EXIT_CODE -ne 0 ]; then
          echo "${{ inputs.environment }} workspace sync failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi
        echo "${{ inputs.environment }} workspace sync completed successfully!"
